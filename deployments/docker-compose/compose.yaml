services:
  mongo_db:
    image: mongo:8.2.6
    container_name: incident_log_mongo_db
    restart: always
    ports:
      - 27017:27017
    volumes:
      - db_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${INCIDENT_LOG_API_MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${INCIDENT_LOG_API_MONGODB_PASSWORD}

  mongo_express:
    image: mongo-express
    container_name: incident_log_mongo_express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${INCIDENT_LOG_API_MONGODB_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${INCIDENT_LOG_API_MONGODB_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongo_db
      ME_CONFIG_BASICAUTH_USERNAME: mexpress
      ME_CONFIG_BASICAUTH_PASSWORD: mexpress
    links:
      - mongo_db

volumes:
  db_data: {}