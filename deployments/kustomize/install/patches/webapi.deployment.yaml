apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-log-webapi
spec:
  template:
    spec:
      initContainers:
        - name: init-mongodb
          env:
            - name: INCIDENT_LOG_API_MONGODB_HOST
              value: null
              valueFrom:
                configMapKeyRef:
                  name: mongodb-connection
                  key: host

            - name: INCIDENT_LOG_API_MONGODB_PORT
              value: null
              valueFrom:
                configMapKeyRef:
                  name: mongodb-connection
                  key: port

            - name: INCIDENT_LOG_API_MONGODB_USERNAME
              value: null
              valueFrom:
                secretKeyRef:
                  name: mongodb-auth
                  key: username

            - name: INCIDENT_LOG_API_MONGODB_PASSWORD
              value: null
              valueFrom:
                secretKeyRef:
                  name: mongodb-auth
                  key: password

      containers:
        - name: incident-log-webapi-container
          env:
            - name: INCIDENT_LOG_API_MONGODB_HOST
              value: null
              valueFrom:
                configMapKeyRef:
                  name: mongodb-connection
                  key: host

            - name: INCIDENT_LOG_API_MONGODB_PORT
              value: null
              valueFrom:
                configMapKeyRef:
                  name: mongodb-connection
                  key: port

            - name: INCIDENT_LOG_API_MONGODB_USERNAME
              value: null
              valueFrom:
                secretKeyRef:
                  name: mongodb-auth
                  key: username

            - name: INCIDENT_LOG_API_MONGODB_PASSWORD
              value: null
              valueFrom:
                secretKeyRef:
                  name: mongodb-auth
                  key: password